<!DOCTYPE html>
<html>
<head>
    <title>Payment Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <style>
        table {
            width: 85%;
            margin: auto;
        }

        button {
            margin: 3px;
        }

        /* Dashboard cards */
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }

        .total { background: #007bff; }
        .urgent { background: black; }
        .soon { background: orange; }

        /* Table row colors */
        .urgent-row {
            background-color: black;
            color: white;
        }

        .soon-row {
            background-color: #fff3cd;
        }
    </style>
</head>
<body>

<h2>💰 Payment Dashboard</h2>

<!-- 📊 SUMMARY -->
<div class="dashboard">
    <div class="card total">
        Total Pending: ₹<span id="totalAmount">0</span>
    </div>

    <div class="card urgent">
        Urgent: <span id="urgentCount">0</span>
    </div>

    <div class="card soon">
        Due Soon: <span id="soonCount">0</span>
    </div>
</div>

<!-- INPUT -->
<input type="text" id="payName" placeholder="Customer Name">
<input type="number" id="payAmount" placeholder="Amount">
<input type="date" id="payDate">

<button onclick="addPayment()">Add Payment</button>

<!-- TABLE -->
<table border="1" id="paymentTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Amount</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let payments = JSON.parse(localStorage.getItem("payments")) || [];

function loadPayments() {
    let tbody = document.querySelector("#paymentTable tbody");
    tbody.innerHTML = "";

    let today = new Date();

    let total = 0;
    let urgentCount = 0;
    let soonCount = 0;

    payments.forEach((pay, index) => {

        let dueDate = new Date(pay.date);
        let diffDays = (dueDate - today) / (1000 * 60 * 60 * 24);

        let status = "Normal";
        let rowClass = "";

        total += parseInt(pay.amount);

        if (diffDays <= 0) {
            status = "URGENT";
            rowClass = "urgent-row";
            urgentCount++;
        } else if (diffDays <= 2) {
            status = "Due Soon";
            rowClass = "soon-row";
            soonCount++;
        }

        let row = `
            <tr class="${rowClass}">
                <td>${pay.name}</td>
                <td>₹${pay.amount}</td>
                <td>${pay.date}</td>
                <td>${status}</td>
                <td>
                    <button onclick="markPaid(${index})">Paid</button>
                    <button onclick="deletePayment(${index})">Delete</button>
                </td>
            </tr>
        `;

        tbody.innerHTML += row;
    });

    // 🔥 Update dashboard values
    document.getElementById("totalAmount").innerText = total;
    document.getElementById("urgentCount").innerText = urgentCount;
    document.getElementById("soonCount").innerText = soonCount;
}

// Add payment
function addPayment() {
    let name = document.getElementById("payName").value.trim();
    let amount = document.getElementById("payAmount").value;
    let date = document.getElementById("payDate").value;

    if (!name || !amount || !date) {
        alert("Fill all fields");
        return;
    }

    payments.push({ name, amount, date });
    saveAndReload();
}

// Paid → remove
function markPaid(index) {
    if (confirm("Payment received?")) {
        payments.splice(index, 1);
        saveAndReload();
    }
}

// Delete
function deletePayment(index) {
    if (confirm("Delete this record?")) {
        payments.splice(index, 1);
        saveAndReload();
    }
}

// Save + reload
function saveAndReload() {
    localStorage.setItem("payments", JSON.stringify(payments));
    loadPayments();

    document.getElementById("payName").value = "";
    document.getElementById("payAmount").value = "";
    document.getElementById("payDate").value = "";
}

// Load on start
window.onload = loadPayments;
</script>

</body>
</html>
