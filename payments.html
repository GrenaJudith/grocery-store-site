<!DOCTYPE html>
<html>
<head>
    <title>Payment Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Alignment and Layout based on sketch */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h2 {
            margin-bottom: 25px;
        }

        /* INPUT ROW: Customer, Amount, and Date in one horizontal line */
        .input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        /* Centered Add Payment Button */
        .add-btn-container {
            margin-bottom: 30px;
        }

        .add-btn-container button {
            padding: 10px 25px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Table Styling */
        table {
            width: 90%;
            margin-bottom: 40px;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            padding: 12px;
        }

        /* DASHBOARD CARDS: Positioned at the bottom per sketch */
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }

        .card {
            padding: 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            min-width: 150px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .total { background: #007bff; border: 1px solid #000; }
        .urgent { background: black; border: 1px solid #000; }
        .soon { background: orange; border: 1px solid #000; color: black; }

        /* Row Highlighting */
        .urgent-row { background-color: black !important; color: white; }
        .soon-row { background-color: #fff3cd !important; }

        button.action-btn {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>💰 Payment Dashboard</h2>

<div class="input-row">
    <input type="text" id="payName" placeholder="Customer Name">
    <input type="number" id="payAmount" placeholder="Amount">
    <input type="date" id="payDate">
</div>

<div class="add-btn-container">
    <button onclick="addPayment()">Add Payment</button>
</div>

<table border="1" id="paymentTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Amount</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="dashboard">
    <div class="card total">
        Total Pending<br>₹<span id="totalAmount">0</span>
    </div>

    <div class="card urgent">
        Urgent<br><span id="urgentCount">0</span>
    </div>

    <div class="card soon">
        Due Soon<br><span id="soonCount">0</span>
    </div>
</div>

<script>
let payments = JSON.parse(localStorage.getItem("payments")) || [];

function loadPayments() {
    let tbody = document.querySelector("#paymentTable tbody");
    tbody.innerHTML = "";

    let today = new Date();
    today.setHours(0,0,0,0);

    let total = 0;
    let urgentCount = 0;
    let soonCount = 0;

    payments.forEach((pay, index) => {
        let dueDate = new Date(pay.date);
        dueDate.setHours(0,0,0,0);
        let diffDays = (dueDate - today) / (1000 * 60 * 60 * 24);

        let status = "Normal";
        let rowClass = "";

        total += parseInt(pay.amount);

        if (diffDays <= 0) {
            status = "URGENT";
            rowClass = "urgent-row";
            urgentCount++;
        } else if (diffDays <= 2) {
            status = "Due Soon";
            rowClass = "soon-row";
            soonCount++;
        }

        let row = `
            <tr class="${rowClass}">
                <td>${pay.name}</td>
                <td>₹${pay.amount}</td>
                <td>${pay.date}</td>
                <td>${status}</td>
                <td>
                    <button class="action-btn" onclick="markPaid(${index})">Paid</button>
                    <button class="action-btn" onclick="deletePayment(${index})">Delete</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });

    document.getElementById("totalAmount").innerText = total;
    document.getElementById("urgentCount").innerText = urgentCount;
    document.getElementById("soonCount").innerText = soonCount;
}

function addPayment() {
    let name = document.getElementById("payName").value.trim();
    let amount = document.getElementById("payAmount").value;
    let date = document.getElementById("payDate").value;

    if (!name || !amount || !date) {
        alert("Fill all fields");
        return;
    }

    payments.push({ name, amount, date });
    saveAndReload();
}

function markPaid(index) {
    if (confirm("Payment received?")) {
        payments.splice(index, 1);
        saveAndReload();
    }
}

function deletePayment(index) {
    if (confirm("Delete this record?")) {
        payments.splice(index, 1);
        saveAndReload();
    }
}

function saveAndReload() {
    localStorage.setItem("payments", JSON.stringify(payments));
    loadPayments();
    document.getElementById("payName").value = "";
    document.getElementById("payAmount").value = "";
    document.getElementById("payDate").value = "";
}

window.onload = loadPayments;
</script>

</body>
</html>
