<!DOCTYPE html>
<html>
<head>
    <title>Stock Maintenance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Stock Maintenance</h2>

<input type="text" id="itemName" placeholder="Item Name">
<input type="number" id="itemQty" placeholder="Quantity">
<button onclick="addOrUpdateItem()">Add / Update</button>

<table border="1" id="inventoryTable">
    <tr>
        <th>Item</th>
        <th>Quantity</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
</table>

<script>
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

// Load existing data
function loadInventory() {
    let table = document.getElementById("inventoryTable");
    table.innerHTML = `
        <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    `;

    inventory.forEach((item, index) => {
        let status = item.qty < 5 ? "Low Stock ⚠️" : "OK";

        let row = table.insertRow();
        row.insertCell(0).innerText = item.name;
        row.insertCell(1).innerText = item.qty;
        row.insertCell(2).innerText = status;

        row.insertCell(3).innerHTML = `
            <button onclick="deleteItem(${index})">Delete</button>
        `;
    });
}

// Add or Update item
function addOrUpdateItem() {
    let name = document.getElementById("itemName").value;
    let qty = parseInt(document.getElementById("itemQty").value);

    if (!name || isNaN(qty)) {
        alert("Enter valid data");
        return;
    }

    let existing = inventory.find(item => item.name === name);

    if (existing) {
        existing.qty += qty; // update stock
    } else {
        inventory.push({ name, qty });
    }

    localStorage.setItem("inventory", JSON.stringify(inventory));
    loadInventory();

    document.getElementById("itemName").value = "";
    document.getElementById("itemQty").value = "";
}

// Delete item
function deleteItem(index) {
    inventory.splice(index, 1);
    localStorage.setItem("inventory", JSON.stringify(inventory));
    loadInventory();
}

// Initial load
loadInventory();
</script>

</body>
</html>
