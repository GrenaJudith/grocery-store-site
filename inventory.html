<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Alignment and Layout based on sketch */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            padding-top: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Inputs placed on left and right sides */
        .input-container {
            display: flex;
            justify-content: space-between;
            width: 80%; /* Spans the width to put inputs on sides */
            max-width: 600px;
            margin-bottom: 15px;
        }

        input {
            padding: 8px;
            border: 1px solid #000;
            width: 40%;
        }

        /* Centered Add/Update button */
        .button-row {
            margin-bottom: 30px;
        }

        /* Table styling */
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
        }

        .low-stock {
            background-color: #ffe0e0; /* light red */
        }

        .very-low {
            background-color: #ff4d4d; /* strong red */
            color: white;
        }

        button {
            margin: 3px;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header-section">
    <div style="font-size: 24px;">🏢</div>
    <h2>Store Inventory</h2>
</div>

<div class="input-container">
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="number" id="itemQty" placeholder="Stock Quantity">
</div>

<div class="button-row">
    <button onclick="addOrUpdateItem()">Add / Update</button>
</div>

<table border="1" id="inventoryTable">
    <thead>
        <tr>
            <th>Item Name</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

// Load inventory
function loadInventory() {
    let tbody = document.querySelector("#inventoryTable tbody");
    tbody.innerHTML = "";

    inventory.forEach((item, index) => {

        let row = document.createElement("tr");

        let status = "OK";

        if (item.qty == 1) {
            row.classList.add("very-low");
            status = "Only 1 left!";
        } else if (item.qty <= 5) {
            row.classList.add("low-stock");
            status = "Low Stock";
        }

        row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.qty}</td>
            <td>${status}</td>
            <td>
                <button onclick="editItem(${index})">Edit</button>
                <button onclick="deleteItem(${index})">Delete</button>
            </td>
        `;

        tbody.appendChild(row);
    });
}

// Add or update item (no duplicates)
function addOrUpdateItem() {
    let name = document.getElementById("itemName").value.trim();
    let qty = parseInt(document.getElementById("itemQty").value);

    if (!name || isNaN(qty)) {
        alert("Enter valid details");
        return;
    }

    let existing = inventory.find(item => item.name.toLowerCase() === name.toLowerCase());

    if (existing) {
        existing.qty += qty;
    } else {
        inventory.push({ name, qty });
    }

    saveAndReload();
}

// Edit item
function editItem(index) {
    let newName = prompt("Edit item name:", inventory[index].name);
    let newQty = prompt("Edit quantity:", inventory[index].qty);

    if (newName && newQty !== null) {
        inventory[index].name = newName.trim();
        inventory[index].qty = parseInt(newQty);
        saveAndReload();
    }
}

// Delete item
function deleteItem(index) {
    if (confirm("Delete this item?")) {
        inventory.splice(index, 1);
        saveAndReload();
    }
}

// Save + reload
function saveAndReload() {
    localStorage.setItem("inventory", JSON.stringify(inventory));
    loadInventory();

    document.getElementById("itemName").value = "";
    document.getElementById("itemQty").value = "";
}

// Load on start
window.onload = loadInventory;
</script>

</body>
</html>
